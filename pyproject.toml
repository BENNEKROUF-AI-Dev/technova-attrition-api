[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]   # erreurs pycodestyle, pyflakes, tri des imports
ignore = ["E501"]          # on tolère les lignes longues
[tool.ruff.lint.isort]
   known-first-party = ["features", "app", "ml"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
